<div class="flex gap-8 p-6">
  <!-- Форма заказа -->
  <form [formGroup]="form" class="flex-1 flex flex-col gap-4" (ngSubmit)="submit()">
    <app-form-field label="Имя" [error]="form.get('firstName')?.errors ? 'Обязательное поле' : ''">
      <app-text-input formControlName="firstName"></app-text-input>
    </app-form-field>

    <app-form-field label="Фамилия" [error]="form.get('lastName')?.errors ? 'Обязательное поле' : ''">
      <app-text-input formControlName="lastName"></app-text-input>
    </app-form-field>

    <app-form-field label="Адрес электронной почты" [error]="form.get('email')?.errors ? 'Неверный email' : ''">
      <app-text-input formControlName="email"></app-text-input>
    </app-form-field>

    <app-form-field label="Телефон">
      <app-text-input formControlName="phone"></app-text-input>
    </app-form-field>

    <app-form-field label="Комментарии">
      <textarea formControlName="comments" class="border rounded p-2 w-full h-24"></textarea>
    </app-form-field>

    <button type="submit" class="bg-blue-600 text-white rounded px-4 py-2 mt-4">Отправить запрос</button>
  </form>

  <!-- Корзина -->
  <div class="w-96 bg-white p-4 rounded shadow flex flex-col gap-4">
    <h2 class="text-lg font-semibold">Ваша корзина</h2>

      @if(cart()) {
       @for(item of cart()!.items; track item.id) {
        <div class="flex justify-between">
          <div>
            <div class="font-medium">{{ item.name }}</div>
            <div class="text-sm text-gray-500">x{{ item.quantity }} шт.</div>
          </div>
          <div class="font-semibold">{{ item.total   }}</div>
        </div>
      }

      <div class="border-t mt-2 pt-2 flex justify-between font-bold">
        <span>Итого:</span>
        <span>{{ cart()!.cartTotal  }}</span>
      </div>
    }
  </div>
</div>
