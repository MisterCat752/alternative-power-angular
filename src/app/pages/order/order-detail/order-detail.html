<div class="order-container">
  
  <!-- Success message -->
  @if(success()) {
    <div class="success-box">
      Заказ успешно создан 🎉
    </div>
  }

  <div class="order-grid">

    <!-- Форма -->
    <form [formGroup]="form" class="order-form" (ngSubmit)="submit()">

      <h2>Оформление заказа</h2>

      <app-form-field label="Имя" [error]="form.get('firstName')?.invalid && form.get('firstName')?.touched ? 'Обязательное поле' : ''">
        <app-text-input formControlName="firstName"></app-text-input>
      </app-form-field>

      <app-form-field label="Фамилия" [error]="form.get('lastName')?.invalid && form.get('lastName')?.touched ? 'Обязательное поле' : ''">
        <app-text-input formControlName="lastName"></app-text-input>
      </app-form-field>

      <app-form-field label="Email" [error]="form.get('email')?.invalid && form.get('email')?.touched ? 'Неверный email' : ''">
        <app-text-input formControlName="email"></app-text-input>
      </app-form-field>

      <app-form-field label="Телефон">
        <app-text-input formControlName="phone"></app-text-input>
      </app-form-field>

      <app-form-field label="Адрес" [error]="form.get('address')?.invalid && form.get('address')?.touched ? 'Обязательное поле' : ''">
        <app-text-input formControlName="address"></app-text-input>
      </app-form-field>

      <app-form-field label="Комментарии">
        <textarea formControlName="comments" class="textarea"></textarea>
      </app-form-field>

      <button type="submit" [disabled]="loading()" class="submit-btn">
        {{ loading() ? 'Отправка...' : 'Оформить заказ' }}
      </button>
    </form>

    <!-- Корзина -->
    <div class="cart-box">
      <h3>Ваша корзина</h3>

      @if(cart()) {
        @for(item of cart()!.items; track item.id) {
          <div class="cart-item">
            <div>
              <div class="item-name">{{ item.name }}</div>
              <div class="item-qty">x{{ item.quantity }} шт.</div>
            </div>
            <div class="item-price">{{ item.total }} €</div>
          </div>
        }

        <div class="cart-total">
          <span>Итого:</span>
          <span>{{ cart()!.cartTotal }} €</span>
        </div>
      }
    </div>

  </div>
</div>
