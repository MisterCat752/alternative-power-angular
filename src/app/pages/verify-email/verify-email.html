<div class="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-4">
  <div class="max-w-md w-full bg-white p-6 rounded-xl shadow">
    <h1 class="text-2xl font-bold mb-4 text-center">
      {{ status === 'success' ? '✅ Email подтверждён!' : status === 'error' ? '❌ Ошибка' : '⌛ Проверка...' }}
    </h1>
    <p class="text-center text-slate-700">{{ message }}</p>

    <div *ngIf="status === 'success'" class="mt-6 text-center">
      <a routerLink="/auth/login" class="text-blue-600 hover:underline">Перейти на страницу входа</a>
    </div>
  </div>
</div>
