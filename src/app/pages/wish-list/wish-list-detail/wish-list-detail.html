<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-[3fr_1fr] gap-6">

  <!-- Список желаемого -->
  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <h1 class="text-2xl font-semibold mb-6">Wishlist</h1>

    @if(wishlist().length) {
      <div class="space-y-4">
        @for(item of wishlist(); track item.id) {
          <div class="flex items-center justify-between border-b border-gray-200 py-4">

            <div class="flex items-center gap-4">
              <img src="https://picsum.photos/seed/{{item.id}}/80/80"
                   class="w-20 h-20 rounded object-contain" />
              <div>
                <div class="font-medium">{{ item.title }}</div>
                <div class="text-sm text-gray-500">SKU: {{ item.sku || '-' }}</div>
              </div>
            </div>

            <button class="text-red-600 hover:underline" (click)="remove(item)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        }
      </div>
    } @else {
      <div class="text-center text-gray-500 py-20">
        Wishlist пуст.
      </div>
    }
  </div>

  <!-- Правая панель -->
  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <h2 class="text-lg font-semibold mb-4">Управление</h2>

    @if(wishlist().length) {
      <div class="space-y-3">
        <div class="flex justify-between">
          <span>Товаров:</span>
          <span>{{ wishlist().length }}</span>
        </div>

        <button
          class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg"
          (click)="clear()">
          Очистить wishlist
        </button>

        <a routerLink="/" class="block text-center text-blue-600 hover:underline">
          Вернуться к покупкам
        </a>
      </div>
    }
  </div>
</div>
