<div class="min-h-screen bg-slate-50 grid place-items-center px-4">
  <div class="w-full max-w-[620px]">
    <div class="text-center mb-6">
      <img src="assets/logo.png" alt="Alternative Power" class="h-7 mx-auto opacity-90" />
    </div>

    <div class="text-center">
      <h1 class="text-3xl font-bold text-slate-900">Зарегистрироваться</h1>
      <p class="text-sm text-slate-500 mt-1">Creează-ți contul astăzi</p>
    </div>

    <form class="mt-8 space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <!-- email -->
      <div>
        <label class="block text-[11px] tracking-wide uppercase text-slate-500 mb-2">
          Адрес электронной почты
        </label>
        <input
          class="w-full h-11 rounded-xl border border-slate-300 bg-white px-3 outline-none
                 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
          type="email"
          placeholder=""
          formControlName="email"
        />
      </div>

      <!-- passwords -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-[11px] tracking-wide uppercase text-slate-500 mb-2">Пароль</label>
          <input
            class="w-full h-11 rounded-xl border border-slate-300 bg-white px-3 outline-none
                   focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
            type="password"
            placeholder=""
            formControlName="password"
          />
        </div>

        <div>
          <label class="block text-[11px] tracking-wide uppercase text-slate-500 mb-2">
            Confirmă parola
          </label>
          <input
            class="w-full h-11 rounded-xl border border-slate-300 bg-white px-3 outline-none
                   focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
            type="password"
            placeholder=""
            formControlName="password2"
          />
        </div>
      </div>

      <!-- user type -->
      <div>
        <!-- <label class="block text-[11px] tracking-wide uppercase text-slate-500 mb-2">
          Тип пользователя
        </label> -->
        <!-- <select
          class="w-full h-11 rounded-xl border border-slate-300 bg-white px-3 outline-none
                 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
          formControlName="userType"
        >
          <option value="" disabled selected>---------</option>
          <option value="PERSON">Persoană</option>
          <option value="COMPANY">Companie</option>
        </select> -->
      </div>

      <!-- accept -->
      <!-- <label class="flex items-start gap-3 text-sm text-slate-700">
        <input type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300" formControlName="accept" />
        <span>
          Accept
          <a class="text-blue-600 hover:underline" href="#">termenii</a>
          și
          <a class="text-blue-600 hover:underline" href="#">politica de confidențialitate</a>
        </span>
      </label> -->

      <button
        type="submit" 
        class="w-full h-12 rounded-xl cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold"
      >
        Înregistrare
      </button>

      <a routerLink="/auth/login" class="block text-center text-sm text-blue-600 hover:underline">
        Ai deja un cont? Conectează-te?
      </a>
    </form>
  </div>
</div>
