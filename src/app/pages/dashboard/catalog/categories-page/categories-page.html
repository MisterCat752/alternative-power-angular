<div class="text-sm text-blue-600 mb-4">
  Dashboard <span class="text-slate-400">›</span> Catalog <span class="text-slate-400">›</span>
  <span class="text-blue-700 font-semibold">Categories</span>
</div>

<div class="flex items-start justify-between gap-4">
  <div>
    <h1 class="text-4xl font-bold text-slate-900">Categories</h1>
    <div class="text-slate-500 mt-1">Organize products into categories</div>
  </div>

  <button class="h-10 px-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold inline-flex items-center gap-2">
    <span class="text-lg leading-none">+</span>
    Add Category
  </button>
</div>

<div class="mt-6 bg-white border border-slate-200 rounded-2xl overflow-hidden">
  <div class="overflow-auto">
    <table class="min-w-[900px] w-full text-sm">
      <thead class="bg-slate-50 text-slate-600">
        <tr class="border-b border-slate-200">
          <th class="px-4 py-3 text-left">NAME</th>
          <th class="px-4 py-3 text-left">SLUG</th>
          <th class="px-4 py-3 text-left">PARENT</th>
          <th class="px-4 py-3 text-left">STATUS</th>
          <th class="px-4 py-3 text-right">ACTIONS</th>
        </tr>
      </thead>

      <tbody>
        @for (c of rows; track c.slug) {
          <tr class="border-b border-slate-100 hover:bg-slate-50">
            <td class="px-4 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-200"></div>
                <div class="font-semibold text-slate-900">{{ c.name }}</div>
              </div>
            </td>

            <td class="px-4 py-4 font-mono text-slate-700">{{ c.slug }}</td>
            <td class="px-4 py-4 text-slate-500">{{ c.parent ?? '—' }}</td>

            <td class="px-4 py-4">
              @if (c.status === 'ACTIVE') {
                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold border border-green-200">
                  ✓ ACTIVE
                </span>
              } @else {
                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold border border-slate-200">
                  INACTIVE
                </span>
              }
            </td>

            <td class="px-4 py-4 text-right">
              <button class="h-9 w-9 rounded-xl hover:bg-slate-100">…</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="px-4 py-3 text-sm text-slate-500 flex items-center justify-between">
    <div>7 items <a class="text-blue-600 hover:underline cursor-pointer ml-2">View all</a></div>
    <div class="flex items-center gap-2">
      <button class="h-9 w-9 rounded-xl border border-slate-200 bg-white hover:bg-slate-50">‹</button>
      <button class="h-9 w-9 rounded-xl border border-slate-200 bg-white hover:bg-slate-50">›</button>
    </div>
  </div>
</div>
