<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="max-w-3xl space-y-6"
>

  <!-- PAGE HEADER -->
  <div class="space-y-1">
    <h1 class="text-2xl font-semibold text-slate-800">
      Add Warranty
    </h1>
    <p class="text-sm text-slate-500">
      Create new warranty option
    </p>
  </div>

  <!-- BASIC INFORMATION -->
  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
    <h2 class="text-lg font-semibold text-slate-800">
      Basic Information
    </h2>

    <!-- Warranty Name -->
    <app-form-field label="Warranty Name">
      <app-text-input
        placeholder="Warranty name"
        formControlName="name"
      />
    </app-form-field>

    <!-- Provider -->
    <app-form-field label="Provider">
      <ui-select
        placeholder="Select provider"
        [options]="providerOptions"
        formControlName="provider"
      />
    </app-form-field>

    <!-- Duration -->
    <app-form-field label="Duration (Years)">
      <app-number-input
        formControlName="durationYears"
      />
    </app-form-field>

    <!-- Service Type -->
    <app-form-field label="Service Type">
      <ui-select
        placeholder="Select service type"
        [options]="serviceTypeOptions"
        formControlName="serviceType"
      />
    </app-form-field>

    <!-- Terms URL -->
    <app-form-field
      label="Terms URL"
      hint="Link to warranty terms and conditions"
    >
      <app-text-input
        placeholder="https://example.com/warranty-terms"
        formControlName="termsUrl"
      />
    </app-form-field>
  </section>

  <!-- ADDITIONAL NOTES -->
  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
    <h2 class="text-lg font-semibold text-slate-800">
      Additional Notes
    </h2>

    <app-form-field
      label="Notes"
      hint="Additional details about this warranty"
    >
      <textarea
        rows="5"
        formControlName="notes"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter additional warranty details..."
      ></textarea>
    </app-form-field>
  </section>

  <!-- ACTIONS -->
  <div class="flex justify-end gap-3">
    <button
      type="submit"
      class="h-10 px-6 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold"
    >
      Create Warranty
    </button>
  </div>

</form>
