<div class="max-w-3xl mx-auto p-6 bg-white shadow-lg rounded-xl transition-all duration-300 ease-in-out">
  <h2 class="text-2xl font-semibold mb-6 text-gray-800">Profile Settings</h2>

  @if (profileForm) {
    <!-- Avatar -->
     

    <!-- Form -->
    <form [formGroup]="profileForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block font-medium text-gray-700 mb-1">First Name</label>
          <input
            formControlName="first_name"
            class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-200"
          />
        </div>

        <div>
          <label class="block font-medium text-gray-700 mb-1">Last Name</label>
          <input
            formControlName="last_name"
            class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-200"
          />
        </div>
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Email</label>
        <input
          formControlName="email"
          class="w-full border p-2 rounded bg-gray-100 cursor-not-allowed"
          readonly
        />
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Phone</label>
        <input
          formControlName="phone"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-200"
        />
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Language</label>
        <select
          formControlName="preferred_language"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-200"
        >
          <option *ngFor="let lang of languages" [value]="lang.code">
            {{ lang.label }}
          </option>
        </select>
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Account Type</label>
        <select
          formControlName="account_type"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-200"
        >
          <option *ngFor="let type of accountTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>
    </form>

    <!-- Save Button -->
    <div class="mt-6 flex justify-start">
      <button
        (click)="saveChanges()"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors duration-200"
      >
        Save Changes
      </button>
    </div>

  } @else {
    <p class="text-gray-500">Loading profile...</p>
  }
</div>
