<div class="max-w-3xl mx-auto p-6 bg-white shadow rounded-lg">
  <h2 class="text-2xl font-semibold mb-6">Настройки профайла </h2>

  @if (profileForm) {

    <!-- Avatar Section -->
    <div class="mb-6">
      <label class="block font-medium text-gray-700 mb-1">Avatar</label>

      <div class="flex items-center gap-4">
        @if (avatarUrl) {
      <img
    [src]="avatarUrl"
    class="w-20 h-20 rounded-full object-cover"
  />
        } @else {
          <span
            class="w-20 h-20 rounded-full bg-gray-200 flex items-center justify-center text-gray-500"
          >
            No Image
          </span>
        }

        <input
          type="file"
          accept=".png,.jpg,.jpeg"
          (change)="updateAvatar($event)"
          class="border p-1 rounded w-20 md:w-full max-w-[210px]"
        />
      </div>
    </div>

    <!-- Main Profile Form -->
    <form [formGroup]="profileForm" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block font-medium text-gray-700 mb-1">First Name</label>
          <input
            formControlName="first_name" 
            class="w-full border p-2 rounded"
          />
        </div>

        <div>
          <label class="block font-medium text-gray-700 mb-1">Last Name</label>
          <input
            formControlName="last_name" 
            class="w-full border p-2 rounded"
          />
        </div>
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Email</label>
        <input
          formControlName="email" 
          class="w-full border p-2 rounded bg-gray-100"
        />

       
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Phone</label>
        <input
          formControlName="phone" 
          class="w-full border p-2 rounded"
        />
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Language</label>
        <select
          formControlName="preferred_language" 
          class="w-full border p-2 rounded"
        >
          <option *ngFor="let lang of languages" [value]="lang.code">
            {{ lang.label }}
          </option>
        </select>
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Account type</label>
        <select
          formControlName="account_type" 
          class="w-full border p-2 rounded"
        >
          <option *ngFor="let type of accountTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>
    </form>

    <!-- Buttons -->
    <div class="mt-6 flex gap-4">
      <button
        (click)="toggleEdit()"
        class="px-4 py-2 border rounded text-blue-600 hover:bg-blue-50"
      >
        {{ editing ? 'Cancel' : 'Edit' }}
      </button>

      @if (editing) {
        <button
          (click)="saveChanges()"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
        >
          Save changes
        </button>
      }
    </div>

  } @else {
    <p>Loading profile...</p>
  }
</div>
