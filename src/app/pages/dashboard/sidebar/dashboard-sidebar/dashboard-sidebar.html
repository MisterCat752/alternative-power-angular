<!-- MOBILE BUTTON -->
<div class="lg:hidden px-3 py-2 bg-white border-b border-slate-200 flex justify-between items-center">
 
  <button (click)="toggleMobile()" class="text-gray-700">
    <mat-icon>menu</mat-icon>
  </button>
</div>

<!-- MOBILE OVERLAY -->
@if(mobileOpen()) {
  <div class="fixed inset-0 z-50 flex">
    <!-- затемнение -->
    <div class="absolute inset-0 bg-black/30" (click)="mobileOpen.set(false)"></div>

    <!-- панель -->
    <aside class="relative bg-white w-3/4 max-w-xs h-full p-4 overflow-auto">
      <div class="flex items-center justify-between mb-4">
        <div class="text-lg font-bold">Menu</div>
        <button (click)="mobileOpen.set(false)" class="text-gray-500">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="space-y-2">
        @for (g of filteredGroups(); track g.key) {
          <div class="rounded-xl overflow-hidden">
            <button
              type="button"
              class="w-full flex items-center justify-between px-3 py-3 hover:bg-slate-100"
              (click)="toggle(g.key)"
            >
              <div class="font-semibold text-slate-800">{{ g.label }}</div>
              <span class="text-slate-500">{{ open()[g.key] ? '▾' : '▸' }}</span>
            </button>

            @if(open()[g.key]) {
              <div class="py-2">
                @for(it of g.items; track it.to) {
                  <a
                    [routerLink]="it.to"
                    routerLinkActive="bg-blue-50 text-blue-700"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="mx-2 px-3 py-2 rounded-lg text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2"
                  >
                    <span class="w-1.5 h-1.5 rounded-full"></span>
                    <span>{{ it.label }}</span>
                  </a>
                }
              </div>
            }
          </div>
        }
      </div>
    </aside>
  </div>
}

<!-- DESKTOP VERSION -->
<aside class="bg-white border-r border-slate-200 min-h-screen sticky top-0 hidden lg:block">
  <div class="px-3 py-4">
    <div class="text-[11px] uppercase tracking-wide text-slate-400 px-3 mb-2">
     Control Panel
    </div>

    <div class="space-y-2">
      @for(g of filteredGroups(); track g.key) {
        <div class="rounded-xl overflow-hidden">
          <button
            type="button"
            class="w-full flex items-center justify-between px-3 py-3 hover:bg-slate-100"
            (click)="toggle(g.key)"
          >
            <div class="font-semibold text-slate-800">{{ g.label }}</div>
            <span class="text-slate-500">{{ open()[g.key] ? '▾' : '▸' }}</span>
          </button>

          @if(open()[g.key]) {
            <div class="py-2">
              @for(it of g.items; track it.to) {
                <a
                  [routerLink]="it.to"
                  routerLinkActive="bg-blue-50 text-blue-700"
                  [routerLinkActiveOptions]="{ exact: true }"
                  class="mx-2 px-3 py-2 rounded-lg text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2"
                >
                  <span class="w-1.5 h-1.5 rounded-full"></span>
                  <span>{{ it.label }}</span>
                </a>
              }
            </div>
          }
        </div>
      }
    </div>
  </div>
</aside>
