<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="max-w-4xl space-y-6"
>

  <!-- PAGE HEADER -->
  <div class="space-y-1">
@if (status === 'edit') {
  <h1 class="text-2xl font-semibold text-slate-800">Edit User</h1>
} @else {
  <h1 class="text-2xl font-semibold text-slate-800">Create User</h1>
}
    <p class="text-sm text-slate-500">
      Fill in the information below to create a new user account.
    </p>
  </div>

  <!-- BASIC INFO -->
  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
    <h2 class="text-lg font-semibold text-slate-800">
      Basic Information
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-form-field label="Email *">
        <app-text-input
          placeholder="user@example.com"
          formControlName="email"
        />
      </app-form-field>

      <app-form-field label="Phone">
        <app-text-input
          placeholder="+373..."
          formControlName="phone"
        />
      </app-form-field>

      <app-form-field label="First name">
        <app-text-input
          formControlName="firstName"
        />
      </app-form-field>

      <app-form-field label="Last name">
        <app-text-input
          formControlName="lastName"
        />
      </app-form-field>
    </div>

 
  
  </section>

  <!-- SECURITY -->
  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
    <h2 class="text-lg font-semibold text-slate-800">
      Security
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-form-field label="Password *">
        <app-text-input
          type="password"
          formControlName="password"
        />
      </app-form-field>

      <app-form-field label="Confirm password *">
        <app-text-input
          type="password"
          formControlName="confirmPassword"
        />
      </app-form-field>
    </div>
</section>

    @if (status === 'edit') {
  <!-- Active -->
  <label class="flex items-center gap-2 text-sm text-slate-700">
    <input
      type="checkbox"
      formControlName="isActive"
      class="rounded border-slate-300"
    />
    Is active
  </label>
  <!-- ROLES -->
  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
    <h2 class="text-lg font-semibold text-slate-800">
      Roles / Groups
    </h2>

 <div  
  formGroupName="roles" 
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 text-sm text-slate-700" >
      <label class="flex items-center gap-2">
        <input type="checkbox" formControlName="customer" /> Customer
      </label> 

      <label class="flex items-center gap-2">
        <input type="checkbox" formControlName="manager" /> Manager
      </label> 
    </div> 
  </section>
} @else {
  <h1 class="text-2xl font-semibold text-slate-800">Create User</h1>
} 
  <div class="flex justify-end gap-3">
    <button
      type="submit"
      class="h-10 px-6 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold"
    >
        @if (status === 'edit') {
   Edit
} @else {
   Create User 
}
    </button>
  </div>

</form>
