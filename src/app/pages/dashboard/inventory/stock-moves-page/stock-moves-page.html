<div class="text-sm text-blue-600 mb-4">
  Dashboard <span class="text-slate-400">›</span> Inventory
  <span class="text-slate-400">›</span>
  <span class="text-blue-700 font-semibold">Stock</span>
</div>

<div class="flex items-start justify-between gap-4">
  <div>
    <h1 class="text-4xl font-bold text-slate-900">Stock</h1>
    <div class="text-slate-500 mt-1">Current stock by location</div>
  </div>
</div>

<!-- stats -->
<div class="mt-6 grid grid-cols-1 lg:grid-cols-4 gap-4">
  @for (stat of stats(); track stat.title) {
    <app-stat-card
      [title]="stat.title"
      [value]="stat.value"
      [icon]="stat.icon"
    />
  }
</div>

<!-- filters -->
<div class="mt-6 grid grid-cols-1 lg:grid-cols-[360px_260px_1fr] gap-3 items-center">
  <div class="bg-white border border-slate-200 rounded-2xl px-4 h-10 flex items-center gap-3">
    <span class="text-slate-400">🔎</span>
    <input
      class="w-full outline-none text-sm"
      placeholder="Product code or name"
      (input)="search.set(($any($event.target).value))"
    />
  </div>
<ui-select
  placeholder="Location"
  [options]="locOpts()"
  [value]="location()"
  (valueChange)="location.set($event)"
></ui-select>
</div>

<!-- table -->
<div class="mt-4 bg-white border border-slate-200 rounded-2xl overflow-hidden">
  <div class="px-4 py-3 text-sm font-semibold text-slate-800">
    Stock list
  </div>

  <div class="overflow-auto">
    <table class="min-w-[1000px] w-full text-sm">
      <thead class="bg-slate-50 text-slate-600">
        <tr class="border-b border-slate-200">
          <th class="px-4 py-3 text-left">PRODUCT</th>
          <th class="px-4 py-3 text-left">LOCATION</th>
          <th class="px-4 py-3 text-left">QTY ON HAND</th>
          <th class="px-4 py-3 text-left">UOM</th>
        </tr>
      </thead>

      <tbody>
        @for (r of rows(); track r.product) {
          <tr class="border-b border-slate-100 hover:bg-slate-50">
            <td class="px-4 py-4">
              <div class="font-semibold text-slate-800">
                {{ r.product_code }}
              </div>
              <div class="text-slate-500 text-xs">
                {{ r.product_name }}
              </div>
            </td>

            <td class="px-4 py-4 text-slate-600">
              {{ r.location_code }}
            </td>

            <td class="px-4 py-4 font-semibold">
              {{ r.qty_on_hand }}
            </td>

            <td class="px-4 py-4">
              <span
                class="inline-flex items-center justify-center h-6 px-2 rounded-lg bg-slate-100 border border-slate-200 text-xs"
              >
                {{ r.product }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
