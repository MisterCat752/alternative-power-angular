<app-container>
  <!-- 1) Слайдер с картинками -->
  <ng-template #imgSlide let-src let-i="index">
    <img [src]="src" class="w-full h-[420px] object-cover rounded-2xl" />
  </ng-template>

  <app-slider
    [items]="slides"
    [itemTpl]="imgSlide"
    [options]="heroOpts"
    [trackBy]="trackByStr"
  ></app-slider>

  <h2 class="text-2xl font-semibold mt-10 mb-4">Популярные товары</h2>
 <!-- КАТЕГОРИИ -->
  @for (c of categories(); track trackByCategory(c)) {
    <section class="mt-12">
      <h2 class="text-2xl font-semibold mb-4 capitalize">
        {{ c.category.replace('-', ' ') }}
      </h2>

      <ng-template #productSlide let-p>
        <div class="p-2">
          <app-product-card
            [product]="p"
            [title]="p.title"
            [imageUrl]="p.image"
            [price]="p.pricing?.salePrice"
            [inStock]="p.quantity > 0"
            (addToCart)="add(p)"
          />
        </div>
      </ng-template>

      <app-slider
        [items]="c.items"
        [itemTpl]="productSlide"
        [options]="productOpts"
        [trackBy]="productTrackBy"
      />
    </section>
  }
</app-container>
