<div
  class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden h-full"
  [class.max-w-[261px]]="variant === 'default'"
  [class.w-full]="variant === 'large'"
>
  <!-- Верх: изображение -->
  <div class="relative p-6 flex items-center justify-center">
  <img
  [src]="imageUrl"
  [alt]="title"
  [class.h-[170px]]="variant === 'default'"
  [class.h-[350px]]="variant === 'large'"
  class="w-full object-cover"
  loading="lazy"
/>

 
  </div>
 
  <!-- Низ: текст -->
  <div class="px-5 pb-5 text-center">
    <div 
    [routerLink]="['/product', productId]"
    class="text-[13px] leading-5 font-medium text-gray-900 line-clamp-3 min-h-[60px] hover:text-green transition durration-400 cursor-pointer">
      {{ title }}
    </div>

    <div class="mt-4 text-sm text-gray-700">
      <span *ngIf="inStock; else outTpl">{{ inStockText }}</span>
      <ng-template #outTpl>{{ outOfStockText }}</ng-template>
    </div>

    <div class="mt-2 font-semibold text-gray-900">
      {{ price.toFixed(2) }} {{ currency }}
    </div>
    <div class="flex items-center gap-3 justify-end mt-3">
      <button class="mt-1 text-black hover:text-red cursor-pointer transition durration-200" (click)="onToggleWithList()">
        @if(isInWishlist(product.id)) {
     <mat-icon class="!text-red ">favorite</mat-icon>
        } @else {
      <mat-icon class="text-red ">favorite_border</mat-icon>
        }
      </button>
      <button
        type="button"
        (click)="onAddToCart(); $event.stopPropagation()"
        class="    rounded-xl  text-black hover:text-green cursor-pointer transition durration-200  text-sm font-semibold   flex items-center justify-center gap-2"
      >
        <mat-icon class="text-[18px]">shopping_cart</mat-icon>
        
      </button>
    </div>
  </div>
</div>
