<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden max-w-[261px]">
  <!-- Верх: изображение -->
  <div class="relative p-6 flex items-center justify-center">
    <img
      [src]="imageUrl"
      [alt]="title"
      class="h-[170px] w-auto object-cover"
      loading="lazy"
    />

    <!-- Кнопка корзины -->
    <button
      type="button"
      (click)="onAddToCart()"
      class="absolute top-4 right-4 w-9 h-9 rounded-full border border-blue-500 bg-white flex items-center justify-center hover:bg-blue-50 active:scale-95 transition"
      aria-label="Add to cart"
    >
      <mat-icon class="text-blue-600 text-[20px]">shopping_cart</mat-icon>
    </button>
  </div>
<a [routerLink]="['/product', productId]">лине</a>
  <!-- Низ: текст -->
  <div class="px-5 pb-5 text-center">
    <div class="text-[13px] leading-5 font-medium text-gray-900 line-clamp-3 min-h-[60px]">
      {{ title }}
    </div>

    <div class="mt-4 text-sm text-gray-700">
      <span *ngIf="inStock; else outTpl">{{ inStockText }}</span>
      <ng-template #outTpl>{{ outOfStockText }}</ng-template>
    </div>

    <div class="mt-2 font-semibold text-gray-900">
      {{ price.toFixed(2) }} {{ currency }}
    </div>
<button (click)="onToggleWithList()">
  @if(isInWishlist(product.id)) {
    <mat-icon class="text-red-500">favorite</mat-icon>
  } @else {
    <mat-icon>favorite_border</mat-icon>
  }
</button>
    <button
  type="button"
  (click)="onAddToCart(); $event.stopPropagation()"
  class="mt-3 w-full rounded-xl bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold py-2 flex items-center justify-center gap-2"
>
  <mat-icon class="text-[18px]">shopping_cart</mat-icon>
  В корзину
</button>
  </div>
</div>
