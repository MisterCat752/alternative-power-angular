<div
  class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center justify-between"
>
  <div>
    <div class="text-sm text-slate-500">{{ title }}</div>

    <div class="text-2xl font-bold" [ngClass]="valueClass ?? 'text-slate-900'">
      {{ value }}
    </div>

    @if (subtitle) {
      <div class="text-xs text-slate-400">{{ subtitle }}</div>
    }
  </div>

  <div class="text-3xl">{{ icon }}</div>
</div>
