<div class="bg-gray shadow">
  <app-container class="py-4">
    <nav class="flex items-center justify-between py-3">
      <!-- Логотип -->
      <a routerLink="/" class="flex items-center">
        <img src="/logo.png" alt="logo" class="max-w-[100px] max-h-[40px]" />
      </a>

      <!-- Поиск -->
      <div class="flex-1 max-w-[592px] mx-6">
        <div class="relative">
          <input
            type="text"
            placeholder="Поиск..."
            class="w-full rounded-full border border-gray-300 px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-blue"
          />
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">search</mat-icon>
        </div>
      </div>

      <!-- Иконки справа -->
      <div class="flex items-center space-x-4">

        <!-- Notifications -->
        <button mat-icon-button type="button">
          <mat-icon>notifications</mat-icon>
        </button>

        <!-- Language -->
        <button mat-button type="button" class="text-text-secondary">EN</button>

        <!-- Cart -->
        <button mat-icon-button type="button" (click)="cartUi.toggle()">
          <mat-icon>shopping_cart</mat-icon>
        </button>

    

        <!-- User Avatar / Login -->
          @if(user) {
          <div class="relative " (document:click)="closeDropdown()" (click)="$event.stopPropagation()">
            <button mat-button type="button" class="flex items-center gap-2 w-8 h-8" (click)="toggleDropdown()">
              <img
                [src]="avatarUrl"
                alt="Avatar"
                class="w-8 h-8 rounded-full object-cover border"
              />
             
            </button>

            <!-- Dropdown -->
            @if(dropdownOpen()) {
        <div class="absolute right-0 mt-2 w-[290px] h-[350px] bg-white border border-gray rounded shadow-md flex flex-col z-50 p-5 justify-between">
  <!-- Верхняя часть: email + ссылки -->
  <div>
       <img
                [src]="avatarUrl"
                alt="Avatar"
                class="w-12 h-12 rounded-full object-cover border mx-auto"
              />
    <span class="text-black text-[14px] my-3 block text-center">{{ user.email }}</span>
    <span class="text-black text-[12px] mb-1 block text-center ">Account Type : {{ user.account_type }}</span>
    <a routerLink="/dashboard/profile" class="px-4 py-2 hover:bg-gray-100 block">Profile</a>
    <a routerLink="/dashboard/profile-settings" class="px-4 py-2 hover:bg-gray-100 block">Settings</a>
  </div>

  <!-- Нижняя часть: кнопка logout -->
  <button class="px-4 py-2 border border-lightGray rounded-[12px] bg-gray text-left hover:bg-black/10 w-full max-w-[260px]" 
          (click)="logout()">
    Logout
  </button>
</div>
            }
          </div>
        } @else {
          <a routerLink="/auth/login" class="inline-flex">
            <button mat-icon-button type="button" aria-label="Login">
              <mat-icon>account_circle</mat-icon>
            </button>
          </a>
        }
      
      
      </div>
    </nav>
  </app-container>
</div>
