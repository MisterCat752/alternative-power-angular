<div class="bg-gray shadow">
  <app-container class="py-2">
    <nav class="flex items-center justify-between">
      <!-- Логотип -->
      <a routerLink="/" class="flex items-center">
        <img src="/logo.png" alt="logo" class="max-w-[100px] max-h-[40px]" />
      </a>

      <!-- Поиск -->
      <div class="flex-1 max-w-[592px] mx-6">
        <div class="relative">
          <input
            type="text"
            placeholder="Поиск..."
            class="w-full rounded-full border border-gray-300 px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-blue"
          />
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">search</mat-icon>
        </div>
      </div>

      <!-- Иконки справа -->
      <div class="flex items-center space-x-4">

        <!-- Notifications -->
        <button mat-icon-button type="button">
          <mat-icon>notifications</mat-icon>
        </button>

        <!-- Language -->
        <button mat-button type="button" class="text-text-secondary">EN</button>

        <!-- Cart -->
        <button mat-icon-button type="button" (click)="cartUi.toggle()">
          <mat-icon>shopping_cart</mat-icon>
        </button>

        <!-- Dashboard -->
        <a routerLink="/dashboard">dash</a>

        <!-- User Avatar / Login -->
        @if(user) {
          <div class="relative">
            <button mat-button type="button" class="flex items-center gap-2">
              <img
                [src]="avatarUrl"
                alt="Avatar"
                class="w-8 h-8 rounded-full object-cover border"
              />
              <span>{{ user.email }}</span>
            </button>
            <!-- Dropdown -->
            <div class="absolute right-0 mt-2 w-40 bg-white border rounded shadow-md z-100 flex flex-col">
              <a routerLink="/dashboard/profile" class="px-4 py-2 hover:bg-gray-100">Profile</a>
              <a routerLink="/dashboard/profile-settings" class="px-4 py-2 hover:bg-gray-100">Settings</a>
              <button class="px-4 py-2 text-left hover:bg-gray-100" (click)="logout()">Logout</button>
            </div>
          </div>
        } @else {
          <a routerLink="/login" class="inline-flex">
            <button mat-icon-button type="button" aria-label="Login">
              <mat-icon>account_circle</mat-icon>
            </button>
          </a>
        }
      
      </div>
    </nav>
  </app-container>
</div>
