@if (isBrowser) {
  <swiper-container
    #swiperEl
    init="false"
    ngSkipHydration
    [class]="options.className ?? 'block w-full'"
  >
    @for (it of items; track trackBy(it); let i = $index) {
      <swiper-slide>
        <ng-container
          [ngTemplateOutlet]="itemTpl"
          [ngTemplateOutletContext]="{ $implicit: it, index: i }"
        />
      </swiper-slide>
    }
  </swiper-container>
}
