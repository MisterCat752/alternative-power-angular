@if (cartUi.isOpen()) {
  <!-- overlay -->
  <div
    class="fixed inset-0 bg-black/50 z-50"
    (click)="close()"
  ></div>

  <!-- drawer -->
  <aside class="fixed top-0 right-0 h-full w-[420px] max-w-[90vw] bg-white z-50 flex flex-col">
    <!-- header -->
    <div class="h-16 px-5 border-b border-slate-200 flex items-center justify-between">
      <div class="text-lg font-semibold">Coș de cumpărături</div>
      <button type="button" class="text-slate-500 hover:text-slate-800 flex items-center gap-1" (click)="close()">
        <mat-icon class="text-[20px]">close</mat-icon>
        <span class="text-sm">Închide</span>
      </button>
    </div>

    <!-- content -->
    <div class="flex-1 overflow-auto p-5">
        @if (cart()?.items?.length) {
    <div class="flex-1 overflow-auto py-3 space-y-4">
      @for (item of cart().items; track item.id) {
        <div class="flex gap-3 border-b pb-3">
<img
  [src]="item.image || 'https://picsum.photos/id/1011/900/900'"
  class="w-16 h-16 rounded"
/>
          <div class="flex-1">
            <p class="text-sm font-medium">{{ item.name }}</p>
            <p class="text-xs text-gray-500">SKU: {{ item.sku }}</p>

            <div class="flex items-center gap-2 mt-2">
              <button (click)="dec(item.id, item.quantity)">−</button>
              <span>{{ item.quantity }}</span>
              <button (click)="inc(item.id, item.quantity)">+</button>
            </div>
          </div>

          <div class="text-sm font-semibold">
            {{ item.total  }} lei
          </div>

          <button (click)="remove(item.id)">
            <mat-icon class="text-red-500">delete</mat-icon>
          </button>
        </div>
      }
    </div>

 
  } @else {
    <div class="flex-1 flex items-center justify-center text-gray-400">
      Cart is empty
    </div>
  }  
    
    </div>
 
    <!-- footer -->
    <div class="border-t border-slate-200 p-5 space-y-3">
      
   <div class="border-t pt-3">
      <div class="flex justify-between font-semibold">
        <span class="text-lg font-semibold">Total:</span>
        <span class="text-lg font-bold text-green-700">{{ cart()?.cartTotal  }} lei</span>
      </div>

    
    </div>
  <a routerLink="/cart"  
        class="flex items-center justify-center w-full h-11 cursor-pointer  rounded-xl bg-green-600 hover:bg-green-700 text-white font-semibold">
        Go to cart
      </a>
     
    </div>
  </aside>
}
