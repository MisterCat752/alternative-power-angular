@if (cartUi.isOpen()) {
  <!-- overlay -->
  <div
    class="fixed inset-0 bg-black/50 z-50"
    (click)="close()"
  ></div>

  <!-- drawer -->
  <aside class="fixed top-0 right-0 h-full w-[420px] max-w-[90vw] bg-white z-50 flex flex-col">
    <!-- header -->
    <div class="h-16 px-5 border-b border-slate-200 flex items-center justify-between">
      <div class="text-lg font-semibold">Coș de cumpărături</div>
      <button type="button" class="text-slate-500 hover:text-slate-800 flex items-center gap-1" (click)="close()">
        <mat-icon class="text-[20px]">close</mat-icon>
        <span class="text-sm">Închide</span>
      </button>
    </div>

    <!-- content -->
    <div class="flex-1 overflow-auto p-5">
      <div class="flex gap-3">
        <img [src]="item.img" class="w-14 h-14 rounded-lg object-cover border border-slate-200" />
        <div class="flex-1">
          <div class="font-semibold text-slate-900 leading-snug">
            {{ item.title }}
          </div>

          <div class="mt-2 inline-flex items-center gap-2 px-3 py-1 rounded-full border border-green-500 text-green-700 text-sm">
            <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
            {{ item.inStockText }}
          </div>

          <div class="mt-3 text-sm text-slate-600">
            <span class="font-semibold text-slate-900">Cod Produs:</span> {{ item.sku }}
          </div>

          <div class="mt-1 text-sm text-slate-600">
            {{ item.qty }} ×
            <span class="text-green-700 font-semibold">{{ item.price.toFixed(2) }} {{ item.currency }}</span>
          </div>
        </div>

        <button type="button" class="text-slate-400 hover:text-slate-700" aria-label="Remove">
          <mat-icon class="text-[20px]">close</mat-icon>
        </button>
      </div>
    </div>

    <!-- footer -->
    <div class="border-t border-slate-200 p-5 space-y-3">
      <div class="flex items-center justify-between">
        <div class="text-lg font-semibold">Sub-total:</div>
        <div class="text-lg font-bold text-green-700">{{ subtotal().toFixed(2) }} {{ item.currency }}</div>
      </div>

      <button type="button" class="w-full h-11 rounded-xl bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold">
        Vezi Coșul
      </button>

      <button type="button" class="w-full h-11 rounded-xl bg-green-600 hover:bg-green-700 text-white font-semibold">
        Finalizare
      </button>
    </div>
  </aside>
}
