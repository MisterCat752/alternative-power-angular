<h1 class="text-3xl font-bold text-slate-900 mb-6">
  @if (isEdit()) {
    Edit Offer
  } @else {
    Create Offer
  }
</h1>

<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-8">

  <!-- OFFER INFORMATION -->

  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-5">

```
<h2 class="text-lg font-semibold text-slate-800">
  Offer Information
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <app-form-field label="Offer Code">
    <app-text-input
      formControlName="code"
      placeholder="OF-2026-001"
    />
  </app-form-field>

  <app-form-field label="Version">
    <app-text-input
      formControlName="version"
      placeholder="1.0"
    />
  </app-form-field>

  <app-form-field label="Project Name">
    <app-text-input
      formControlName="project_name"
      placeholder="Solar installation"
    />
  </app-form-field>

  <app-form-field label="Project Owner">
    <app-text-input
      formControlName="project_owner"
      placeholder="John Doe"
    />
  </app-form-field>

  <app-form-field label="Status">
    <app-text-input formControlName="status" />
  </app-form-field>

  <app-form-field label="Valid Until">
    <app-text-input
      type="date"
      formControlName="valid_until"
    />
  </app-form-field>

</div>
```

  </section>

  <!-- ITEMS -->

  <section class="bg-white rounded-2xl border border-slate-200 p-6 space-y-6">

```
<div class="flex items-center justify-between">
  <h2 class="text-lg font-semibold text-slate-800">
    Offer Items
  </h2>

  <button
    type="button"
    (click)="addItem()"
    class="px-3 py-1.5 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700 transition"
  >
    + Add Item
  </button>
</div>

@if (items.length === 0) {

  <div class="flex flex-col items-center justify-center py-12 text-slate-400">
    <span class="text-5xl mb-3">📦</span>
    <p>No items added yet</p>
  </div>

}

<div formArrayName="items" class="space-y-4">

  @for (item of items.controls; track $index) {

    <div
      [formGroupName]="$index"
      class="border border-slate-200 rounded-xl p-5 bg-slate-50 space-y-4"
    >

      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-600">
          Item #{{$index + 1}}
        </span>

        <button
          type="button"
          class="text-sm text-red-600 hover:underline"
          (click)="removeItem($index)"
        >
          Remove
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

        <app-form-field label="Group">
          <app-text-input formControlName="group" />
        </app-form-field>

        <app-form-field label="Product">
          <app-text-input formControlName="name" />
        </app-form-field>

        <app-form-field label="SKU">
          <app-text-input formControlName="sku" />
        </app-form-field>

        <app-form-field label="Quantity">
          <app-number-input formControlName="qty" />
        </app-form-field>

        <app-form-field label="Unit Price">
          <app-number-input formControlName="unit_price" />
        </app-form-field>

      </div>

    </div>

  }

</div>
```

  </section>

  <!-- ACTIONS -->

  <div class="flex justify-end gap-3 pt-4">

```
<button
  type="button"
  class="px-4 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50"
>
  Cancel
</button>

<button
  type="submit"
  class="px-5 py-2 rounded-xl bg-black text-white hover:bg-slate-900 transition"
>
  @if (isEdit()) {
    Update Offer
  } @else {
    Create Offer
  }
</button>
```

  </div>

</form>
