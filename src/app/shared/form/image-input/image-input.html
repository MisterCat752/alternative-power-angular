<div class="flex flex-col gap-2">
  <div
    class="h-40 rounded-xl border-2 border-dashed
           flex items-center justify-center cursor-pointer
           hover:bg-slate-50"
    (click)="fileInput.click()"
  >
    @if (preview) {
      <img [src]="preview" class="max-h-full rounded-xl" />
    } @else {
      <span class="text-slate-500">Upload image</span>
    }
  </div>

  <input
    #fileInput
    type="file"
    accept="image/*"
    hidden
    (change)="pickFile($event)"
  />
</div>
