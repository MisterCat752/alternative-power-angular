<h2 class="text-xl font-bold mb-4">
  {{ location ? 'Edit Location' : 'Create Location' }}
</h2>

<form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
 <app-form-field
    label="Code"
    [error]="
      form.controls.code.touched && form.controls.code.errors
        ? 'Required'
        : undefined
    "
  >
    <app-text-input
      formControlName="code"
      [disabled]="!!location" 
    />
  </app-form-field>

  <app-form-field label="Name">
    <app-text-input formControlName="name" />
  </app-form-field>

  <app-form-field label="Usage Type">
    <ui-select
      formControlName="usage"
      [options]="usageOptions"
    />
  </app-form-field>

  <app-form-field label="Parent Location">
    <ui-select
      formControlName="parent"
      [options]="parentOptions"
    />
  </app-form-field>

  <!-- Ошибки -->
  @if (error) {
    <div class="text-sm text-red-600">{{ error }}</div>
  }

  <div class="flex justify-end gap-3 pt-4">
    <button
      type="button"
      class="px-4 py-2 border rounded-lg"
      (click)="cancel.emit()"
    >
      Cancel
    </button>

    <button
      type="submit"
      class="px-4 py-2 rounded-lg bg-blue-600 text-white disabled:opacity-50"
      [disabled]="loading"
    >
      {{ loading ? 'Saving...' : 'Save' }}
    </button>
  </div>
</form>
