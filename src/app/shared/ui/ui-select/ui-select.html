<div class="relative">
  <button
    type="button"
    (click)="toggle()"
    [disabled]="disabled"
    class="h-10 px-4 rounded-xl bg-white border border-slate-200
           hover:bg-slate-50 text-sm font-semibold
           inline-flex items-center justify-between w-full
           disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <span class="truncate">
      {{ selected()?.label ?? placeholder }}
    </span>
    <span class="ml-2 text-slate-500">▾</span>
  </button>

  @if (open()) {
    <div
      class="absolute left-0 top-[calc(100%+8px)]
             w-[320px] max-w-[90vw]
             bg-white border border-slate-200
             rounded-2xl shadow-xl
             overflow-hidden z-50"
    >
      <div class="py-2">
        @for (o of options; track o.label) {
          <button
            type="button"
            (click)="pick(o.value)"
            class="w-full text-left px-4 py-3
                   hover:bg-slate-50
                   flex items-center justify-between gap-3"
          >
            <div class="min-w-0">
              <div class="text-sm font-semibold text-slate-800 flex gap-2">
                @if (o.icon === 'check') {
                  <span class="text-green-600">●</span>
                }
                <span class="truncate">{{ o.label }}</span>
              </div>

              @if (o.hint) {
                <div class="text-xs text-slate-500 truncate">
                  {{ o.hint }}
                </div>
              }
            </div>

            @if (o.value === value) {
              <span class="text-blue-600 font-bold">✓</span>
            }
          </button>
        }
      </div>
    </div>
  }
</div>
